name: fixtures-regression

on:
  push:
    branches: [ "**" ]
  pull_request:

jobs:
  offline-fixtures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests beautifulsoup4 pandas python-dotenv

      - name: Run fixture diagnostics
        run: |
          python tools/diagnostico_fixtures.py --json-out .cache/diagnostico_fixtures.json --md-out .cache/diagnostico_fixtures.md

      - name: Run fixture-driven tests
        run: |
          pytest -q \
            tests/test_bol_scraper_parsing.py \
            tests/test_ticketline_fixtures.py \
            tests/test_imperdivel_parsing.py \
            tests/test_teatroapp_ui_drift.py

      - name: Upload diagnostic artifacts
        uses: actions/upload-artifact@v4
        with:
          name: diagnostico-fixtures
          path: |
            .cache/diagnostico_fixtures.json
            .cache/diagnostico_fixtures.md
